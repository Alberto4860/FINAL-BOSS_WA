<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agenda de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
            <div>
                <h1 class="mb-0">Agenda de Contactos</h1>
            </div>
            <a href="register.html" class="btn btn-primary">Agregar contacto</a>
        </div>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <div class="card mb-4">
            <div class="card-body d-flex flex-column flex-lg-row gap-2">
                <input id="searchInput" class="form-control" placeholder="Buscar por nombre o email">
                <button id="sortBtn" class="btn btn-outline-secondary" type="button">Ordenar A-Z</button>
                <button id="showFavBtn" class="btn btn-outline-warning" type="button">Solo favoritos</button>
            </div>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Fav</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaContactos">
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
